<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAN Cube Controller</title>
  <style>
    :root {
      --bg: #101114;
      --panel: rgba(27, 29, 36, 0.90);
      --text: #f5f5f5;
      --muted: #aeb4c2;
      --accent: #5f7cff;
      --safe: #245c3b;
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 8px;
      overflow: hidden;
    }

    main {
      position: relative;
      width: min(100%, 960px);
      height: calc(100vh - 16px);
      margin: 0 auto;
      background: #15171d;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 55px rgba(0,0,0,.32);
    }

    .cube-stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .cube-wrap {
      overflow: auto;
      max-width: 100%;
      max-height: 100%;
      padding: 6px;
    }

    .cube-net {
      display: grid;
      grid-template-columns: repeat(12, 34px);
      grid-template-rows: repeat(9, 34px);
      gap: 4px;
      width: max-content;
      margin: 0 auto;
    }

    .sticker {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.30), 0 1px 2px rgba(0,0,0,.25);
    }

    .empty {
      width: 34px;
      height: 34px;
    }

    .bubble {
      position: absolute;
      right: 12px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      box-shadow: 0 14px 40px rgba(0,0,0,.30);
      z-index: 2;
    }

    .last-bubble {
      top: 12px;
      width: 132px;
      min-height: 118px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      margin-bottom: 3px;
    }

    #lastMove {
      font-size: clamp(52px, 11vw, 92px);
      font-weight: 950;
      line-height: .95;
      text-align: center;
    }

    .control-bubble {
      bottom: 12px;
      width: min(310px, calc(100% - 24px));
      padding: 8px;
    }

    #history {
      color: var(--muted);
      font-size: 12px;
      min-height: 16px;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    button {
      min-height: 38px;
      font-size: 13px;
      padding: 7px 8px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font-weight: 800;
    }

    button.safe {
      background: var(--safe);
    }

    @media (max-width: 650px) {
      main {
        border-radius: 20px;
      }

      .cube-stage {
        padding: 4px;
      }

      .cube-net {
        grid-template-columns: repeat(12, 24px);
        grid-template-rows: repeat(9, 24px);
        gap: 2px;
      }

      .sticker, .empty {
        width: 24px;
        height: 24px;
      }

      .sticker {
        border-radius: 6px;
      }

      .last-bubble {
        top: 8px;
        right: 8px;
        width: 90px;
        min-height: 82px;
        border-radius: 16px;
        padding: 6px;
      }

      .label {
        font-size: 10px;
      }

      #lastMove {
        font-size: clamp(42px, 16vw, 70px);
      }

      .control-bubble {
        right: 8px;
        bottom: 8px;
        width: min(250px, calc(100% - 16px));
        border-radius: 16px;
        padding: 7px;
      }

      #history {
        font-size: 11px;
      }

      button {
        min-height: 34px;
        font-size: 12px;
        padding: 6px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="cube-stage">
      <div class="cube-wrap">
        <div id="cubeNet" class="cube-net"></div>
      </div>
    </section>

    <section class="bubble last-bubble">
      <div class="label">LAST</div>
      <div id="lastMove">—</div>
    </section>

    <section class="bubble control-bubble">
      <div id="history">Connect the cube, physically solve it, then tap Set Solved.</div>
      <div class="buttons">
        <button id="connectBtn">Connect</button>
        <button id="calibrateBtn" class="safe">Set Solved</button>
      </div>
    </section>
  </main>

  <script type="module">

    import { connectGanCube } from "https://esm.sh/gan-web-bluetooth?bundle";

    const CUBE_MAC = "C8:17:F5:D7:CE:F7";

    const connectBtn = document.getElementById("connectBtn");
    const solvedBtn = document.getElementById("solvedBtn");
    const statusEl = document.getElementById("status");
    const lastMoveEl = document.getElementById("lastMove");
    const historyEl = document.getElementById("history");
    const cubeNetEl = document.getElementById("cubeNet");

    const colors = {
      U: "#ffffff",
      R: "#d72638",
      F: "#22c55e",
      D: "#ffd23f",
      L: "#ff8c1a",
      B: "#2563eb",
      "?": "#3a3f4f"
    };

    const facePositions = {
      U: [0, 3],
      L: [3, 0],
      F: [3, 3],
      R: [3, 6],
      B: [3, 9],
      D: [6, 3]
    };

    let cube = solvedCube();
    let moves = [];
    let statePackets = 0;
    let stickerEls = {};

    function solvedCube() {
      return {
        U: Array(9).fill("U"),
        R: Array(9).fill("R"),
        F: Array(9).fill("F"),
        D: Array(9).fill("D"),
        L: Array(9).fill("L"),
        B: Array(9).fill("B")
      };
    }

    function resetGraphicToSolved(message = "Graphic reset to solved.") {
      cube = solvedCube();
      moves = [];
      statePackets = 0;
      lastMoveEl.textContent = "SOLVED";
      historyEl.textContent = message;
      updateStickerColors();
    }

    function buildCubeNetOnce() {
      cubeNetEl.innerHTML = "";
      stickerEls = {};

      for (let row = 0; row < 9; row++) {
        for (let col = 0; col < 12; col++) {
          const div = document.createElement("div");
          let stickerFace = null;
          let stickerIndex = null;

          for (const face of Object.keys(facePositions)) {
            const [fr, fc] = facePositions[face];
            if (row >= fr && row < fr + 3 && col >= fc && col < fc + 3) {
              stickerFace = face;
              stickerIndex = (row - fr) * 3 + (col - fc);
              break;
            }
          }

          if (stickerFace) {
            div.className = "sticker";
            stickerEls[`${stickerFace}${stickerIndex}`] = div;
          } else {
            div.className = "empty";
          }

          cubeNetEl.appendChild(div);
        }
      }

      updateStickerColors();
    }

    function updateStickerColors() {
      for (const face of Object.keys(cube)) {
        for (let i = 0; i < 9; i++) {
          const el = stickerEls[`${face}${i}`];
          if (el) el.style.background = colors[cube[face][i]] || colors["?"];
        }
      }
    }

    function applyFacelets(facelets) {
      if (typeof facelets !== "string" || facelets.length < 54) return false;

      // gan-web-bluetooth facelet strings appear in URFDLB order.
      const order = ["U", "R", "F", "D", "L", "B"];
      let idx = 0;

      for (const face of order) {
        cube[face] = facelets
          .slice(idx, idx + 9)
          .split("")
          .map(x => colors[x] ? x : "?");
        idx += 9;
      }

      statePackets += 1;
      updateStickerColors();

      // Important: do NOT set lastMove to STATE.
      // STATE is not a move; it is a full cube snapshot.
      historyEl.textContent = `Graphic synced from full cube state ${statePackets} time(s). Last move display kept separate.`;

      return true;
    }

    function rotateFaceCW(face) {
      const f = cube[face].slice();
      cube[face][0] = f[6];
      cube[face][1] = f[3];
      cube[face][2] = f[0];
      cube[face][3] = f[7];
      cube[face][4] = f[4];
      cube[face][5] = f[1];
      cube[face][6] = f[8];
      cube[face][7] = f[5];
      cube[face][8] = f[2];
    }

    function cycle4(a, b, c, d) {
      const temp = a.map(([face, i]) => cube[face][i]);
      a.forEach(([face, i], idx) => cube[face][i] = cube[d[idx][0]][d[idx][1]]);
      d.forEach(([face, i], idx) => cube[face][i] = cube[c[idx][0]][c[idx][1]]);
      c.forEach(([face, i], idx) => cube[face][i] = cube[b[idx][0]][b[idx][1]]);
      b.forEach(([face, i], idx) => cube[face][i] = temp[idx]);
    }

    function applyQuarterTurn(face) {
      rotateFaceCW(face);

      if (face === "U") cycle4([["F",0],["F",1],["F",2]], [["R",0],["R",1],["R",2]], [["B",0],["B",1],["B",2]], [["L",0],["L",1],["L",2]]);
      if (face === "D") cycle4([["F",6],["F",7],["F",8]], [["L",6],["L",7],["L",8]], [["B",6],["B",7],["B",8]], [["R",6],["R",7],["R",8]]);
      if (face === "R") cycle4([["U",2],["U",5],["U",8]], [["F",2],["F",5],["F",8]], [["D",2],["D",5],["D",8]], [["B",6],["B",3],["B",0]]);
      if (face === "L") cycle4([["U",0],["U",3],["U",6]], [["B",8],["B",5],["B",2]], [["D",0],["D",3],["D",6]], [["F",0],["F",3],["F",6]]);
      if (face === "F") cycle4([["U",6],["U",7],["U",8]], [["L",8],["L",5],["L",2]], [["D",2],["D",1],["D",0]], [["R",0],["R",3],["R",6]]);
      if (face === "B") cycle4([["U",2],["U",1],["U",0]], [["R",8],["R",5],["R",2]], [["D",6],["D",7],["D",8]], [["L",0],["L",3],["L",6]]);
    }

    function normalizeMove(rawMove) {
      if (!rawMove) return null;

      if (typeof rawMove === "string") {
        const s = rawMove.trim().toUpperCase();
        const exact = s.match(/^([UDLRFB])([2']?)$/);
        if (exact) return exact[1] + exact[2];

        const embedded = s.match(/([UDLRFB][2']?)/);
        return embedded ? embedded[1] : null;
      }

      if (typeof rawMove === "object") {
        if (typeof rawMove.notation === "string") return normalizeMove(rawMove.notation);
        if (typeof rawMove.name === "string") return normalizeMove(rawMove.name);
        if (typeof rawMove.move === "string") return normalizeMove(rawMove.move);

        const faceValue = rawMove.face || rawMove.layer || rawMove.side || rawMove.axis;
        if (typeof faceValue !== "string") return null;

        const faceMatch = faceValue.toUpperCase().match(/[UDLRFB]/);
        if (!faceMatch) return null;

        const f = faceMatch[0];
        const dir = rawMove.direction ?? rawMove.dir ?? rawMove.amount ?? rawMove.turns ?? rawMove.angle ?? rawMove.clockwise;

        if (dir === false || dir === -1 || dir === "-1" || dir === "CCW" || dir === "ccw") return f + "'";
        if (dir === 2 || dir === "2" || dir === 180 || dir === "180") return f + "2";
        return f;
      }

      return null;
    }

    function applyMove(rawMove) {
      const move = normalizeMove(rawMove);
      if (!move) {
        historyEl.textContent = "Unknown move packet received.";
        return;
      }

      const face = move[0];
      const turns = move.includes("2") ? 2 : move.includes("'") ? 3 : 1;

      for (let i = 0; i < turns; i++) applyQuarterTurn(face);

      moves.unshift(move);
      moves = moves.slice(0, 30);

      lastMoveEl.textContent = move;
      historyEl.textContent = moves.join("  ");
      updateStickerColors();
    }

    solvedBtn.addEventListener("click", () => {
      resetGraphicToSolved("Graphic manually reset to solved.");
      statusEl.innerHTML = `<span class="ok">Graphic set to solved.</span>`;
    });

    connectBtn.addEventListener("click", async () => {
      try {
        if (!navigator.bluetooth) {
          statusEl.textContent = "Web Bluetooth not available. Use Chrome on Android.";
          return;
        }

        statusEl.textContent = "Opening Bluetooth picker...";

        const conn = await connectGanCube(async () => CUBE_MAC);

        resetGraphicToSolved("Connected: graphic started from solved.");
        statusEl.innerHTML = `<span class="ok">Connected.</span> Hybrid tracking active.`;
        connectBtn.textContent = "Connected";

        conn.events$.subscribe((event) => {
          try {
            if (event.type === "MOVE") {
              applyMove(event.move);
            }

            if (event.type === "FACELETS") {
              const facelets = event.facelets || event.state || event.cubeState;
              applyFacelets(facelets);
            }

            if (event.type === "DISCONNECT") {
              statusEl.textContent = "Disconnected.";
              connectBtn.textContent = "Reconnect GAN Cube";
            }
          } catch (handlerErr) {
            statusEl.textContent = "Event handler error.";
            historyEl.textContent = handlerErr.message;
          }
        });

      } catch (err) {
        statusEl.textContent = "Connection failed or canceled.";
        historyEl.textContent = err.message;
      }
    });

    buildCubeNetOnce();
  
  </script>
</body>
</html>
