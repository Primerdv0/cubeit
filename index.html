<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAN Cube Controller Test</title>
  <style>
    :root {
      --bg: #101114;
      --panel: #1b1d24;
      --panel2: #111318;
      --text: #f5f5f5;
      --muted: #aeb4c2;
      --accent: #5f7cff;
      --safe: #245c3b;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
    }

    main {
      width: min(96vw, 720px);
      background: var(--panel);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    h1 { margin: 0 0 6px; font-size: 28px; }
    p { margin: 6px 0 14px; }
    .muted { color: var(--muted); }

    button {
      width: 100%;
      font-size: 18px;
      padding: 14px;
      border: 0;
      border-radius: 16px;
      background: var(--accent);
      color: white;
      font-weight: 800;
      margin: 8px 0;
    }

    button.secondary { background: #303545; }
    button.safe { background: var(--safe); }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .card {
      background: var(--panel2);
      border-radius: 18px;
      padding: 14px;
      margin-top: 10px;
    }

    .big {
      font-size: 46px;
      font-weight: 900;
      text-align: center;
      line-height: 1.1;
    }

    .cube-wrap {
      overflow-x: auto;
      padding: 12px 4px;
    }

    .cube-net {
      display: grid;
      grid-template-columns: repeat(12, 26px);
      grid-template-rows: repeat(9, 26px);
      gap: 3px;
      width: max-content;
      margin: 0 auto;
    }

    .sticker {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.28);
    }

    .empty {
      width: 26px;
      height: 26px;
    }

    .ok { color: #76f7a1; }
    .warn { color: #ffd166; }

    @media (max-width: 560px) {
      main { padding: 16px; }
      .grid2 { grid-template-columns: 1fr; }
      .cube-net {
        grid-template-columns: repeat(12, 22px);
        grid-template-rows: repeat(9, 22px);
        gap: 2px;
      }
      .sticker, .empty { width: 22px; height: 22px; border-radius: 5px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>GAN Cube Controller Test</h1>
    <p class="muted">
      Reoriented state mode: full cube-state packets drive the graphic, but colors are normalized using the center stickers.
      Solve the real cube and tap calibrate if the colors/orientation look wrong.
    </p>

    <button id="connectBtn">Connect GAN Cube</button>
    <button id="calibrateBtn" class="safe">Calibrate Current Solved Orientation</button>
    <button id="solvedBtn" class="secondary">Reset Graphic to Solved</button>

    <div class="grid2">
      <div class="card">
        <div class="muted">Status</div>
        <div id="status">Not connected</div>
      </div>

      <div class="card">
        <div class="muted">Last move / state</div>
        <div id="lastMove" class="big">—</div>
      </div>
    </div>

    <div class="card">
      <div class="muted">Cube graphic</div>
      <div class="cube-wrap">
        <div id="cubeNet" class="cube-net"></div>
      </div>
    </div>

    <div class="card">
      <div class="muted">Info</div>
      <div id="history">None yet</div>
    </div>
  </main>

  <script type="module">
    import { connectGanCube } from "https://esm.sh/gan-web-bluetooth?bundle";

    const CUBE_MAC = "C8:17:F5:D7:CE:F7";

    const connectBtn = document.getElementById("connectBtn");
    const calibrateBtn = document.getElementById("calibrateBtn");
    const solvedBtn = document.getElementById("solvedBtn");
    const statusEl = document.getElementById("status");
    const lastMoveEl = document.getElementById("lastMove");
    const historyEl = document.getElementById("history");
    const cubeNetEl = document.getElementById("cubeNet");

    const colors = {
      U: "#ffffff",
      R: "#d72638",
      F: "#22c55e",
      D: "#ffd23f",
      L: "#ff8c1a",
      B: "#2563eb",
      "?": "#3a3f4f"
    };

    const facePositions = {
      U: [0, 3],
      L: [3, 0],
      F: [3, 3],
      R: [3, 6],
      B: [3, 9],
      D: [6, 3]
    };

    // Facelet packet order for gan-web-bluetooth appears to be URFDLB.
    const faceOrder = ["U", "R", "F", "D", "L", "B"];
    const centerIndex = { U: 4, R: 13, F: 22, D: 31, L: 40, B: 49 };

    let cube = solvedCube();
    let moves = [];
    let statePackets = 0;
    let latestRawFacelets = null;
    let stickerEls = {};

    // This map says, "raw facelet letter X should be displayed as normalized face Y."
    // Default solved color convention:
    // U white, R red, F green, D yellow, L orange, B blue.
    let colorMap = { U: "U", R: "R", F: "F", D: "D", L: "L", B: "B" };

    function solvedCube() {
      return {
        U: Array(9).fill("U"),
        R: Array(9).fill("R"),
        F: Array(9).fill("F"),
        D: Array(9).fill("D"),
        L: Array(9).fill("L"),
        B: Array(9).fill("B")
      };
    }

    function resetGraphicToSolved(message = "Graphic reset to solved.") {
      cube = solvedCube();
      moves = [];
      lastMoveEl.textContent = "SOLVED";
      historyEl.textContent = message;
      updateStickerColors();
    }

    function buildCubeNetOnce() {
      cubeNetEl.innerHTML = "";
      stickerEls = {};

      for (let row = 0; row < 9; row++) {
        for (let col = 0; col < 12; col++) {
          const div = document.createElement("div");
          let stickerFace = null;
          let stickerIndex = null;

          for (const face of Object.keys(facePositions)) {
            const [fr, fc] = facePositions[face];
            if (row >= fr && row < fr + 3 && col >= fc && col < fc + 3) {
              stickerFace = face;
              stickerIndex = (row - fr) * 3 + (col - fc);
              break;
            }
          }

          if (stickerFace) {
            div.className = "sticker";
            stickerEls[`${stickerFace}${stickerIndex}`] = div;
          } else {
            div.className = "empty";
          }

          cubeNetEl.appendChild(div);
        }
      }

      updateStickerColors();
    }

    function updateStickerColors() {
      for (const face of Object.keys(cube)) {
        for (let i = 0; i < 9; i++) {
          const el = stickerEls[`${face}${i}`];
          if (el) el.style.background = colors[cube[face][i]] || colors["?"];
        }
      }
    }

    function calibrateFromCenters(facelets) {
      if (typeof facelets !== "string" || facelets.length < 54) return false;

      const nextMap = {};

      // If raw center at U position is "F", then raw F stickers should display as U.
      for (const face of faceOrder) {
        const rawCenterLetter = facelets[centerIndex[face]];
        if (!rawCenterLetter) return false;
        nextMap[rawCenterLetter] = face;
      }

      colorMap = {
        U: nextMap.U || colorMap.U || "U",
        R: nextMap.R || colorMap.R || "R",
        F: nextMap.F || colorMap.F || "F",
        D: nextMap.D || colorMap.D || "D",
        L: nextMap.L || colorMap.L || "L",
        B: nextMap.B || colorMap.B || "B"
      };

      historyEl.textContent =
        `Calibrated centers. Map: U→${colorMap.U}, R→${colorMap.R}, F→${colorMap.F}, D→${colorMap.D}, L→${colorMap.L}, B→${colorMap.B}`;

      return true;
    }

    function applyFacelets(facelets, autoReorient = true) {
      if (typeof facelets !== "string" || facelets.length < 54) return false;

      latestRawFacelets = facelets;

      if (autoReorient) {
        // Re-orient on every state packet using current center stickers.
        // This keeps the display consistent even if the cube orientation/color basis changes.
        calibrateFromCenters(facelets);
      }

      let idx = 0;
      for (const face of faceOrder) {
        const raw = facelets.slice(idx, idx + 9).split("");
        cube[face] = raw.map(letter => colorMap[letter] || "?");
        idx += 9;
      }

      statePackets += 1;
      updateStickerColors();

      lastMoveEl.textContent = "STATE";
      historyEl.textContent =
        `Graphic updated from reoriented state packet ${statePackets}.`;

      return true;
    }

    function rotateFaceCW(face) {
      const f = cube[face].slice();
      cube[face][0] = f[6];
      cube[face][1] = f[3];
      cube[face][2] = f[0];
      cube[face][3] = f[7];
      cube[face][4] = f[4];
      cube[face][5] = f[1];
      cube[face][6] = f[8];
      cube[face][7] = f[5];
      cube[face][8] = f[2];
    }

    function cycle4(a, b, c, d) {
      const temp = a.map(([face, i]) => cube[face][i]);
      a.forEach(([face, i], idx) => cube[face][i] = cube[d[idx][0]][d[idx][1]]);
      d.forEach(([face, i], idx) => cube[face][i] = cube[c[idx][0]][c[idx][1]]);
      c.forEach(([face, i], idx) => cube[face][i] = cube[b[idx][0]][b[idx][1]]);
      b.forEach(([face, i], idx) => cube[face][i] = temp[idx]);
    }

    function applyQuarterTurn(face) {
      rotateFaceCW(face);

      if (face === "U") cycle4([["F",0],["F",1],["F",2]], [["R",0],["R",1],["R",2]], [["B",0],["B",1],["B",2]], [["L",0],["L",1],["L",2]]);
      if (face === "D") cycle4([["F",6],["F",7],["F",8]], [["L",6],["L",7],["L",8]], [["B",6],["B",7],["B",8]], [["R",6],["R",7],["R",8]]);
      if (face === "R") cycle4([["U",2],["U",5],["U",8]], [["F",2],["F",5],["F",8]], [["D",2],["D",5],["D",8]], [["B",6],["B",3],["B",0]]);
      if (face === "L") cycle4([["U",0],["U",3],["U",6]], [["B",8],["B",5],["B",2]], [["D",0],["D",3],["D",6]], [["F",0],["F",3],["F",6]]);
      if (face === "F") cycle4([["U",6],["U",7],["U",8]], [["L",8],["L",5],["L",2]], [["D",2],["D",1],["D",0]], [["R",0],["R",3],["R",6]]);
      if (face === "B") cycle4([["U",2],["U",1],["U",0]], [["R",8],["R",5],["R",2]], [["D",6],["D",7],["D",8]], [["L",0],["L",3],["L",6]]);
    }

    function normalizeMove(rawMove) {
      if (!rawMove) return null;

      if (typeof rawMove === "string") {
        const s = rawMove.trim().toUpperCase();
        const exact = s.match(/^([UDLRFB])([2']?)$/);
        if (exact) return exact[1] + exact[2];

        const embedded = s.match(/([UDLRFB][2']?)/);
        return embedded ? embedded[1] : null;
      }

      if (typeof rawMove === "object") {
        if (typeof rawMove.notation === "string") return normalizeMove(rawMove.notation);
        if (typeof rawMove.name === "string") return normalizeMove(rawMove.name);
        if (typeof rawMove.move === "string") return normalizeMove(rawMove.move);

        const faceValue = rawMove.face || rawMove.layer || rawMove.side || rawMove.axis;
        if (typeof faceValue !== "string") return null;

        const faceMatch = faceValue.toUpperCase().match(/[UDLRFB]/);
        if (!faceMatch) return null;

        const f = faceMatch[0];
        const dir = rawMove.direction ?? rawMove.dir ?? rawMove.amount ?? rawMove.turns ?? rawMove.angle ?? rawMove.clockwise;

        if (dir === false || dir === -1 || dir === "-1" || dir === "CCW" || dir === "ccw") return f + "'";
        if (dir === 2 || dir === "2" || dir === 180 || dir === "180") return f + "2";
        return f;
      }

      return null;
    }

    function applyMove(rawMove) {
      const move = normalizeMove(rawMove);
      if (!move) {
        historyEl.textContent = "Unknown move packet received.";
        return;
      }

      const face = move[0];
      const turns = move.includes("2") ? 2 : move.includes("'") ? 3 : 1;

      for (let i = 0; i < turns; i++) applyQuarterTurn(face);

      moves.unshift(move);
      moves = moves.slice(0, 30);

      lastMoveEl.textContent = move;
      historyEl.textContent = moves.join("  ");
      updateStickerColors();
    }

    solvedBtn.addEventListener("click", () => {
      resetGraphicToSolved("Graphic manually reset to solved.");
    });

    calibrateBtn.addEventListener("click", () => {
      if (!latestRawFacelets) {
        historyEl.textContent = "No facelet state received yet. Connect and turn once first.";
        return;
      }

      if (calibrateFromCenters(latestRawFacelets)) {
        applyFacelets(latestRawFacelets, false);
        statusEl.innerHTML = `<span class="ok">Calibrated from current center stickers.</span>`;
      }
    });

    connectBtn.addEventListener("click", async () => {
      try {
        if (!navigator.bluetooth) {
          statusEl.textContent = "Web Bluetooth not available. Use Chrome on Android.";
          return;
        }

        statusEl.textContent = "Opening Bluetooth picker...";

        const conn = await connectGanCube(async () => CUBE_MAC);

        resetGraphicToSolved("Connected: graphic started from solved.");
        statusEl.innerHTML = `<span class="ok">Connected.</span> Reoriented state mode active.`;
        connectBtn.textContent = "Connected";

        conn.events$.subscribe((event) => {
          try {
            if (event.type === "MOVE") {
              applyMove(event.move);
            }

            if (event.type === "FACELETS") {
              const facelets = event.facelets || event.state || event.cubeState;
              applyFacelets(facelets, true);
            }

            if (event.type === "DISCONNECT") {
              statusEl.textContent = "Disconnected.";
              connectBtn.textContent = "Reconnect GAN Cube";
            }
          } catch (handlerErr) {
            statusEl.textContent = "Event handler error.";
            historyEl.textContent = handlerErr.message;
          }
        });

      } catch (err) {
        statusEl.textContent = "Connection failed or canceled.";
        historyEl.textContent = err.message;
      }
    });

    buildCubeNetOnce();
  </script>
</body>
</html>
