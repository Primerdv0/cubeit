<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAN Cube Phone Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #101114;
      color: #f5f5f5;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    main {
      width: min(92vw, 520px);
      background: #1b1d24;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    h1 { margin-top: 0; font-size: 28px; }
    button {
      width: 100%;
      font-size: 20px;
      padding: 16px;
      border: 0;
      border-radius: 16px;
      background: #5f7cff;
      color: white;
      font-weight: 700;
      margin: 12px 0;
    }
    .card {
      background: #111318;
      border-radius: 18px;
      padding: 16px;
      margin-top: 12px;
    }
    .big {
      font-size: 54px;
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
    }
    .muted { color: #aeb4c2; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 220px;
      overflow: auto;
      background: #0b0c10;
      padding: 12px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <main>
    <h1>GAN Cube Phone Test</h1>
    <p class="muted">Open this in Chrome on Android over HTTPS. Tap connect, choose the GAN cube, then turn a face.</p>

    <button id="connectBtn">Connect GAN Cube</button>

    <div class="card">
      <div class="muted">Status</div>
      <div id="status">Not connected</div>
    </div>

    <div class="card">
      <div class="muted">Last move</div>
      <div id="lastMove" class="big">—</div>
    </div>

    <div class="card">
      <div class="muted">Move history</div>
      <div id="history">None yet</div>
    </div>

    <div class="card">
      <div class="muted">Raw event log</div>
      <pre id="log"></pre>
    </div>
  </main>

  <script type="module">
    import { connectGanCube } from "https://esm.sh/gan-web-bluetooth?bundle";

    const connectBtn = document.getElementById("connectBtn");
    const statusEl = document.getElementById("status");
    const lastMoveEl = document.getElementById("lastMove");
    const historyEl = document.getElementById("history");
    const logEl = document.getElementById("log");

    let moves = [];

    function log(message, data) {
      const line = `[${new Date().toLocaleTimeString()}] ${message}` +
        (data ? `\n${JSON.stringify(data, null, 2)}` : "");
      logEl.textContent = `${line}\n\n${logEl.textContent}`;
    }

    connectBtn.addEventListener("click", async () => {
      try {
        if (!navigator.bluetooth) {
          statusEl.textContent = "Web Bluetooth not available. Use Chrome on Android.";
          return;
        }

        statusEl.textContent = "Opening Bluetooth picker...";
        log("Attempting cube connection");

        const conn = await connectGanCube();
        statusEl.textContent = "Connected. Turn the cube.";
        connectBtn.textContent = "Connected";

        conn.events$.subscribe(async (event) => {
          log("Cube event", event);

          if (event.type === "MOVE") {
            const move = event.move;
            moves.unshift(move);
            moves = moves.slice(0, 20);
            lastMoveEl.textContent = move;
            historyEl.textContent = moves.join("  ");
          }

          if (event.type === "FACELETS") {
            statusEl.textContent = "Connected. Facelet state received.";
          }

          if (event.type === "DISCONNECT") {
            statusEl.textContent = "Disconnected.";
            connectBtn.textContent = "Reconnect GAN Cube";
          }
        });

        await conn.sendCubeCommand({ type: "REQUEST_FACELETS" });
      } catch (err) {
        statusEl.textContent = "Connection failed or canceled.";
        log("Error", { message: err.message, stack: err.stack });
      }
    });
  </script>
</body>
</html>
